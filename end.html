<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明代建筑等级制度 - 结尾页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .viewport {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .stage {
      position: absolute;
      width: 1920px;
      height: 1080px;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(var(--scale));
    }

    .full-img {
      position: absolute;
      left: 0;
      top: 0;
      width: 1920px;
      height: 1080px;
      object-fit: cover;
    }

    .hidden {
      display: none !important;
    }

    #nextBtn {
      position: absolute;
      border: none;
      background: transparent;
      cursor: pointer;
      z-index: 999;

      left: 836px;
      top: 755px;
      width: 239px;
      height: 66px;
    }
    #nextBtn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .btn-back-home {
      position: absolute;
      left: 50px;
      top: 50px;
      z-index: 1000;
      padding: 12px 20px;
      background: #6B7280;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="viewport">
  <div class="stage">
    <a href="index.html" class="btn-back-home">返回首页</a>

    <div id="step1">
      <img src="images/end/sum.png" class="full-img" alt="">
      <button id="nextBtn">
        <img src="images/end/Group 94.png" alt="点击进入">
      </button>
    </div>

    <div id="step2" class="hidden">
      <img src="images/end/end.png" class="full-img" alt="">
    </div>
  </div>
</div>

<!-- 页面讲解音频 -->
<audio id="pageAudio" autoplay>
  <source src="audio/end.wav" type="audio/mpeg">
</audio>

<!-- 全局BGM -->
<iframe id="musicFrame" src="music.html" style="display:none;width:0;height:0;border:0;" allow="autoplay"></iframe>

<script>
  // 1. 自适应缩放（永远全屏，不黑边、按钮不乱跑）
  function updateScale() {
    const vw = document.querySelector('.viewport').clientWidth;
    const vh = document.querySelector('.viewport').clientHeight;
    const scale = Math.max(vw / 1920, vh / 1080);
    document.querySelector('.stage').style.setProperty('--scale', scale);
  }
  window.addEventListener('resize', updateScale);
  window.addEventListener('load', updateScale);

  // ==============================================
  // 2. 核心修复：BGM 音量提前降低 + 立刻生效
  // ==============================================
  let bgMusic;
  const musicFrame = document.getElementById("musicFrame");
  const pageAudio = document.getElementById("pageAudio");

  // 页面加载后立刻初始化BGM，并直接把音量变小
  window.addEventListener('load', () => {
    setTimeout(() => {
      try {
        bgMusic = window.top.bgMusic || musicFrame.contentWindow.bgMusic;
        window.bgMusic = bgMusic;
        
        // 🔥 一进来就把BGM音量变小（不等待）
        if (bgMusic) {
          bgMusic.volume = 0.15;  // BGM音量 15%
          bgMusic.play().catch(() => {});
        }

        // 🔥 语音播完再恢复音量
        pageAudio.addEventListener('ended', () => {
          if (bgMusic) bgMusic.volume = 1.0;
        });
        
      } catch (e) {}
    }, 100); // 极短延迟，保证BGM一定能获取到
  });

  // 3. 点击切换图片
  const step1 = document.getElementById("step1");
  const step2 = document.getElementById("step2");
  document.getElementById("nextBtn").addEventListener("click", () => {
    step1.classList.add("hidden");
    step2.classList.remove("hidden");
  });
</script>

</body>
</html>
