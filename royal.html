    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .royal-container {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 1920px;
        height: 1080px;
        transform-origin: top left;
        transform: scale(var(--scale, 1)) translate(-50%, -50%);
        background: #f5f5f5;
        overflow: hidden;
      }
      .royal-img {
        position: absolute;
        object-fit: contain;
        transition: all 0.2s ease-in-out;
        z-index: 20;
      }
      .decor-line {
        position: absolute;
        height: 0;
        outline: 1px solid #333;
        outline-offset: -0.5px;
        z-index: 20;
      }
      .back-btn-wrapper {
        position: absolute;
        left: 1645px;
        top: 885px;
        width: 209px;
        height: 130px;
        z-index: 30;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
      }
      .back-btn-wrapper:hover .royal-img {
        transform: scale(1.03);
        opacity: 0.95;
      }
      .model-img-placeholder {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 710px;
        height: 550px;
        z-index: 10;
        background: transparent;
        cursor: pointer;
        overflow: hidden;
        border-radius: 8px;
      }
      .main-display-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        transition: opacity 0.3s ease;
      }
      .mouse-tooltip {
        position: fixed;
        background: rgba(51, 51, 51, 0.9);
        color: #fff;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 14px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.1s ease;
        z-index: 9999;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      .model-switch-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        z-index: 30;
        transition: all 0.2s ease;
        width: 360px;
        height: 260px;
      }
      .model-switch-btn:hover {
        transform: translateY(-50%) scale(1.1);
        opacity: 0.8;
      }
      .left-btn {
        left: 50px;
      }
      .right-btn {
        right: 50px;
      }

      .img-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        transform: scale(1.3);
        transform-origin: center center;
      }
      .img-box {
        position: relative;
        width: 1536px;
        height: 1024px;
      }
      .img-modal img {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: left top;
      }
      .img-close-btn {
        position: absolute;
        top: 20px;
        right: 30px;
        color: #fff;
        font-size: 40px;
        cursor: pointer;
        z-index: 1000;
      }

      .model-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: url("images/图卷 1.png") center center / cover no-repeat;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
      }
      .model-modal-content {
        width: 90%;
        max-width: 1200px;
        height: 80vh;
        background: transparent;
        border-radius: 10px;
        position: relative;
        border: none;
        backdrop-filter: none;
      }
      #modalModelViewer {
        width: 100%;
        height: 100%;
      }
      .model-close-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        background: #333;
        color: white;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 20px;
        cursor: pointer;
        z-index: 1001;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .model-close-btn:hover {
        background: #555;
      }
      .to-end-btn {
        position: absolute;
        left: 50%;
        bottom: 60px;
        transform: translateX(-50%);
        padding: 1rem 2.5rem;
        background: #333;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 8px;
        cursor: pointer;
        z-index: 40;
        transition: all 0.2s ease-in-out;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      }
      .to-end-btn:hover {
        background: #555;
        transform: translateX(-50%) scale(1.05);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
      }
      .custom-tag-btn {
        position: absolute;
        z-index: 21;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .custom-tag-btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }
      .tag-text {
        position: absolute;
        left: 30.41px;
        top: 24.78px;
        width: 40px;
        height: 112px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        color: #333;
        font-size: 2.25rem;
        font-family: "STFangsong", serif;
        line-height: 1.2;
      }

      .light-square {
        position: absolute;
        left: var(--left);
        top: var(--top);
        width: var(--w);
        height: var(--h);
        border: 2px solid #333;
        box-shadow:
          0 0 0 2px rgba(255, 255, 255, 0.9),
          0 0 10px 2px #ffffff,
          0 0 20px 4px #ffffff;
        opacity: 0;
        pointer-events: none;
        animation: squareAnim var(--duration, 3s) ease forwards;
      }
      @keyframes squareAnim {
        0% {
          opacity: 0;
          transform: scale(0.8);
        }
        10% {
          opacity: 1;
          transform: scale(1);
        }
        90% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(0.95);
        }
      }
    </style>

              {
                left: 230,
                top: 608,
                w: 620,
                h: 231,
                duration: 11,
                voice: "audio/royal/祭祀开间/3.wav",
              },
              {
                left: 863,
                top: 606,
                w: 437,
                h: 221,
                duration: 9,
                voice: "audio/royal/祭祀开间/4.wav",
              },
            ],
            zhuangshi: [
              { duration: 6, voice: "audio/royal/祭祀装饰/0.wav" },
              {
                left: 299,
                top: 187,
                w: 1024,
                h: 312,
                duration: 9,
                voice: "audio/royal/祭祀装饰/1.wav",
              },
              {
                left: 222,
                top: 519,
                w: 448,
                h: 235,
                duration: 10,
                voice: "audio/royal/祭祀装饰/2.wav",
              },
              {
                left: 687,
                top: 567,
                w: 266,
                h: 226,
                duration: 7,
                voice: "audio/royal/祭祀装饰/3.wav",
              },
              {
                left: 981,
                top: 509,
                w: 284,
                h: 99,
                duration: 9,
                voice: "audio/royal/祭祀装饰/4.wav",
              },
              {
                left: 968,
                top: 618,
                w: 346,
                h: 204,
                duration: 9,
                voice: "audio/royal/祭祀装饰/5.wav",
              },
            ],
          },
        },
      ];

      let currentIndex = 0;
      let currentBuildingData = buildingList[0];
      const tooltip = document.getElementById("mouseTooltip");
      let currentAudio = null;
      let timerList = [];

      window.onload = function () {
        updateBuildingContent();
        updateScale();
        playBuildingEnterVoice();
      };

      function playBuildingEnterVoice() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        timerList.forEach((t) => clearTimeout(t));
        timerList = [];

        const voiceUrl = currentBuildingData.enterVoice;
        if (!voiceUrl) return;

        if (window.bgMusic) window.bgMusic.volume = 0.2;

        currentAudio = new Audio(voiceUrl);
        currentAudio.volume = 1.0;
        currentAudio.play().catch(() => {
          document.addEventListener('click', () => currentAudio.play(), { once: true });
        });

        currentAudio.onended = function() {
          if (window.bgMusic) window.bgMusic.volume = 1.0;
        };
      }

      function updateBuildingContent() {
        document.getElementById("mainDisplayImg").src = currentBuildingData.mainImg;
        document.getElementById("bgImage").src = currentBuildingData.bgImg;
      }

      function switchBuilding(direction) {
        currentIndex = direction === "next"
          ? (currentIndex + 1) % buildingList.length
          : (currentIndex - 1 + buildingList.length) % buildingList.length;
        currentBuildingData = buildingList[currentIndex];
        updateBuildingContent();
        playBuildingEnterVoice();
      }

      function showTooltip() { tooltip.style.opacity = 1; }
      function hideTooltip() { tooltip.style.opacity = 0; }
      function moveTooltip(e) {
        tooltip.style.left = e.clientX + 15 + "px";
        tooltip.style.top = e.clientY + 10 + "px";
      }

      // ✅ 修复模型加载（核心）
      function openModelModal() {
        playTagSound();
        
        const modelViewer = document.getElementById("modalModelViewer");
        modelViewer.src = "";
        setTimeout(() => {
          modelViewer.src = currentBuildingData.modelUrl;
          modelViewer.load();
        }, 50);

        document.getElementById("modelModal").style.display = "flex";

        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }

        setTimeout(() => {
          const modelVoiceUrl = currentBuildingData.modelVoice;
          if (!modelVoiceUrl) return;

          if (window.bgMusic) window.bgMusic.volume = 0.2;

          currentAudio = new Audio(modelVoiceUrl);
          currentAudio.volume = 1.0;
          currentAudio.play().catch(() => {});

          currentAudio.onended = function() {
            if (window.bgMusic) window.bgMusic.volume = 1.0;
          };
        }, 300);
      }

      function closeModelModal() {
        document.getElementById("modelModal").style.display = "none";
        document.getElementById("modalModelViewer").src = "";
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        setTimeout(restoreBGMVolume, 300);
      }

      function openImgModal(type) {
        const url = currentBuildingData[type + "Img"];
        if (!url) {
          alert("暂无图片");
          return;
        }

        const modalImg = document.getElementById("modalImg");
        const imgBox = document.getElementById("imgBox");
        modalImg.src = url;

        imgBox.querySelectorAll(".light-square").forEach((el) => el.remove());
        if (currentAudio) currentAudio.pause();
        timerList.forEach((t) => clearTimeout(t));
        timerList = [];

        const list = currentBuildingData.lights[type];
        let time = 0;

        list.forEach((item, index) => {
          const timer = setTimeout(() => {
            if (index === 0) {
              currentAudio = new Audio(item.voice);
              currentAudio.volume = 1.0;
              currentAudio.play().catch(() => {});
              return;
            }
            const div = document.createElement("div");
            div.className = "light-square";
            div.style.cssText = `
              --left: ${item.left}px;
              --top: ${item.top}px;
              --w: ${item.w}px;
              --h: ${item.h}px;
              --duration: ${item.duration}s;
            `;
            imgBox.appendChild(div);

            if (item.voice) {
              if (currentAudio) currentAudio.pause();
              currentAudio = new Audio(item.voice);
              currentAudio.volume = 1.0;
              currentAudio.play().catch(() => {});
            }
            setTimeout(() => div.remove(), item.duration * 1000);
          }, time);
          timerList.push(timer);
          time += item.duration * 1000;
        });

        document.getElementById("imgModal").style.display = "flex";
      }

      function closeImgModal() {
        document.getElementById("imgModal").style.display = "none";
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        timerList.forEach((t) => clearTimeout(t));
        timerList = [];
        setTimeout(restoreBGMVolume, 300);
      }

      window.addEventListener("click", (e) => {
        if (e.target === document.getElementById("modelModal")) closeModelModal();
        if (e.target === document.getElementById("imgModal")) closeImgModal();
      });

      function updateScale() {
        const scaleX = window.innerWidth / 1920;
        const scaleY = window.innerHeight / 1080;
        const scale = Math.max(scaleX, scaleY);
        document.documentElement.style.setProperty("--scale", scale);
      }
      window.addEventListener("resize", updateScale);

      function lowerBGMVolume() {
        if (window.bgMusic) window.bgMusic.volume = 0.2;
      }
      function restoreBGMVolume() {
        if (window.bgMusic) window.bgMusic.volume = 1.0;
      }

      const _openImgModal = openImgModal;
      openImgModal = function (type) {
        lowerBGMVolume();
        _openImgModal(type);
      };

      const _openModelModal = openModelModal;
      openModelModal = function () {
        lowerBGMVolume();
        _openModelModal();
      };

      const _closeImgModal = closeImgModal;
      closeImgModal = function () {
        _closeImgModal();
        setTimeout(restoreBGMVolume, 300);
      };

      const _closeModelModal = closeModelModal;
      closeModelModal = function () {
        _closeModelModal();
        setTimeout(restoreBGMVolume, 300);
      };
    </script>

    <iframe
      id="musicFrame"
      src="music.html"
      style="display: none; width: 0; height: 0; border: 0"
      allow="autoplay"
    ></iframe>
    <script>
      let bgMusic;
      const musicFrame = document.getElementById("musicFrame");

      musicFrame.onload = function () {
        bgMusic = window.top.bgMusic || musicFrame.contentWindow.bgMusic;
        window.bgMusic = bgMusic;

        if (bgMusic && bgMusic.paused) {
          bgMusic.play().catch(() => {
            document.addEventListener("click", () => bgMusic.play(), {
              once: true,
            });
          });
        }
      };
    </script>
