<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>明筑尊卑志</title>
  <style>
    html,body { margin:0; padding:0; height:100%; width:100%; background:#000; overflow:hidden; }
    #app { position:fixed; inset:0; width:100vw; height:100vh; }
    #introVideo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; z-index:999; }
    #playBtn {
      position: absolute;
      top: 4%;
      right: 3%;
      padding: 12px 24px;
      background: rgba(0,0,0,0.7);
      color: #D4B886;
      border: 1px solid #8B6E46;
      border-radius: 999px;
      cursor: pointer;
      z-index: 1000;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    #playBtn:hover {
      background: rgba(0,0,0,0.9);
      border-color: #D4B886;
    }
    .main-page { position:relative; width:100vw; height:100vh; overflow:hidden; display:none; z-index:100; }
    .bg-img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center; }
    .enter-btn { position:absolute; left:50%; bottom:1vh; transform:translateX(-50%); width:28vw; height:auto; object-fit:contain; cursor:pointer; z-index:20; transition:scale 0.2s ease; }
    .enter-btn:hover { scale:1.05; }
    body.debug .enter-btn { outline:2px dashed rgba(255,255,255,0.7); background:rgba(255,255,255,0.08); }
  </style>
</head>

<body>
<div id="app">
  <video id="introVideo" src="images/index/video1.mp4" muted playsinline preload="auto"></video>
  <button id="playBtn">点击播放视频</button>

  <div class="main-page" id="mainPage">
    <img class="bg-img" src="images/index/intro.png" alt="背景">
    <a href="identity.html" style="display:block;width:100%;height:100%;">
      <img class="enter-btn" src="images/index/btn_enter.png" alt="进入探索">
    </a>
  </div>
</div>

<iframe id="musicFrame" src="music.html" style="display:none;width:0;height:0;border:0;" allow="autoplay"></iframe>

<script>
const video = document.getElementById("introVideo");
const playBtn = document.getElementById("playBtn");
const mainPage = document.getElementById("mainPage");
const musicFrame = document.getElementById("musicFrame");

// 视频结束后播放音乐
function showMainPage() {
  video.style.display = "none";
  playBtn.style.display = "none";
  mainPage.style.display = "block";

  setTimeout(() => {
    musicFrame.contentWindow.postMessage("PLAY_BGM", "*");
  }, 100);
}

// ============== 核心修复：禁止自动播放 ==============
// 页面加载时只加载，不播放！只显示第一帧
video.load();

// 点击按钮才播放 + 取消静音
playBtn.onclick = async () => {
  video.muted = false;
  try {
    await video.play();
  } catch (e) {}
  playBtn.style.display = "none";
};

// 视频播放结束
video.onended = function(){
  sessionStorage.setItem("from_index", "true");
  showMainPage();
};

document.addEventListener("keydown", (e) => {
  if (e.key === "d" || e.key === "D") document.body.classList.toggle("debug");
});

window.addEventListener("beforeunload", () => video.pause());
</script>
</body>
</html>
